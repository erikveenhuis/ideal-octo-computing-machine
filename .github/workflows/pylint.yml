name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Verify installation
      run: |
        python --version
        pylint --version
        pytest --version

    - name: Run pylint
      run: |
        # Lint production code only. We pass an explicit, ordered list because
        # pylint's import resolution is order-sensitive when multiple files are
        # passed individually (it can otherwise fail to find `config` from
        # services/* with "No module named config.py").
        pylint app.py config.py utils.py exceptions.py error_handlers.py \
               services/*.py \
               --fail-under=8.0

    - name: Run pytest
      env:
        FLASK_CONFIG: testing
        MAPBOX_ACCESS_TOKEN: pk.ci-test
        REPLICATE_API_TOKEN: r8_ci-test
        GITHUB_WEBHOOK_SECRET: ci-webhook-secret
      run: |
        pytest --cov=. --cov-report=term --cov-report=xml --cov-fail-under=80

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml
        if-no-files-found: ignore
