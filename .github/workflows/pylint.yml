name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # pycairo: use wheels only (no system libcairo / compiler chain in CI).
        pip install --only-binary=pycairo -r requirements.txt
        pip install --only-binary=pycairo -r requirements-dev.txt

    - name: Verify Python tooling
      run: |
        python --version
        pylint --version
        pytest --version

    - name: Run pylint
      run: |
        # Lint production code only. We pass an explicit, ordered list because
        # pylint's import resolution is order-sensitive when multiple files are
        # passed individually (it can otherwise fail to find `config` from
        # services/* with "No module named config.py").
        pylint app.py config.py exceptions.py error_handlers.py \
               utils/*.py services/*.py \
               --fail-under=9.0

    - name: Run pytest
      env:
        FLASK_CONFIG: testing
        MAPBOX_ACCESS_TOKEN: pk.ci-test
        GITHUB_WEBHOOK_SECRET: ci-webhook-secret
      run: |
        pytest --cov=. --cov-report=term --cov-report=xml --cov-fail-under=80

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml
        if-no-files-found: ignore

  js-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install JS dev dependencies
      run: npm ci

    - name: Run JS test suite
      run: npm test
