<!-- Map area with left margin for fixed sidebar -->
<div class="ml-80 h-full">
    <div class="map-container">
        <div class="map-bleed-zoom mapboxgl-ctrl mapboxgl-ctrl-group" role="toolbar" aria-label="Map zoom">
            <button type="button" id="mapBleedZoomIn" class="mapboxgl-ctrl-zoom-in" title="Zoom in" aria-label="Zoom in">
                <span class="mapboxgl-ctrl-icon" aria-hidden="true"></span>
            </button>
            <button type="button" id="mapBleedZoomOut" class="mapboxgl-ctrl-zoom-out" title="Zoom out" aria-label="Zoom out">
                <span class="mapboxgl-ctrl-icon" aria-hidden="true"></span>
            </button>
        </div>
        <div class="map-wrapper">
            <div id="mapOverlayContainer" class="map-overlay-container hidden" aria-hidden="true">
                <img id="mapOverlayImage" alt="Selected overlay" />
            </div>
            <div id="map"></div>
        </div>
    </div>
</div>
