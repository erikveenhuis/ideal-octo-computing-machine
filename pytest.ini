[pytest]
testpaths = tests
# ``-ra`` shows reasons for skips/xfails. ``--strict-markers`` rejects
# typo'd ``@pytest.mark.foo`` decorators. Coverage gate matches CI.
# Requires ``pytest-cov`` from ``requirements-dev.txt``.
addopts = -ra --strict-markers --cov=. --cov-report=term --cov-fail-under=80
filterwarnings =
    ignore::DeprecationWarning:flask_limiter
    ignore::DeprecationWarning:limits
    # Pillow / SwigPy lazy-loaded extension types from gpxpy chain.
    ignore::DeprecationWarning:importlib._bootstrap
